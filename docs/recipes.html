<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flavorweaver Recipe Search</title>
  <link rel="stylesheet" href="styles.css?v=20260703-07" />
  <link rel="stylesheet" href="site.css?v=20260703-07" />
  <link rel="stylesheet" href="readability.css?v=20260703-07" />
</head>
<body>
  <header class="site-topbar">
    <nav class="site-nav" aria-label="Flavorweaver navigation">
      <div class="nav-spacer" aria-hidden="true"></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a aria-current="page" href="recipes.html">Search</a>
        <a href="index.html#featured">Featured</a>
        <a href="index.html#categories">Categories</a>
        <a href="dedication.html">Dedication</a>
      </div>
    </nav>
  </header>

  <main class="page-shell">
    <section class="hero-card hero-card--archive">
      <p class="eyebrow">Recipe Archive</p>
      <h1>Search Recipes</h1>
      <p class="lead">Search Flavorweaver by title, collection, culture, category, status, ingredient, or tag.</p>
    </section>

    <section class="search-panel" aria-label="Recipe search controls">
      <label class="search-label" for="recipe-search">Search recipes</label>
      <input class="search-input" id="recipe-search" type="search" placeholder="Search the recipe archive..." autocomplete="off" />
      <div class="quick-searches" id="quick-searches" aria-label="Quick searches"></div>
    </section>

    <section class="results-panel" aria-live="polite">
      <div class="result-count" id="result-count">Loading recipe pages...</div>
      <div class="results-grid" id="results"></div>
    </section>
  </main>

  <script src="world-recipe-data.js?v=20260703-07"></script>
  <script src="world-recipe-overrides.js?v=20260703-07"></script>
  <script src="family-recipe-data.js?v=20260703-07"></script>
  <script src="recipe-search.js?v=20260703-07"></script>
  <script>
    window.FLAVORWEAVER_RECIPE_SEARCH.initArchiveSearch();
  </script>
</body>
</html>
