<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search Appetizers | Flavorweaver</title>
  <link rel="stylesheet" href="styles.css?v=20260613-04" />
  <link rel="stylesheet" href="site.css?v=20260613-04" />
  <link rel="stylesheet" href="readability.css?v=20260613-04" />
</head>
<body>
  <header class="site-topbar">
    <nav class="site-nav" aria-label="Flavorweaver navigation">
      <div class="nav-spacer" aria-hidden="true"></div>
      <div class="nav-links"><a href="index.html">Home</a><a href="recipes.html">Search</a><a href="index.html#featured">Featured</a><a href="index.html#categories">Categories</a><a href="dedication.html">Dedication</a></div>
    </nav>
  </header>
  <main class="page-shell home-layout">
    <section class="hero-card hero-card--archive">
      <p class="eyebrow">Archive Path</p>
      <h1>Search Appetizers</h1>
      <p class="hero-copy">Small bites, starters, party foods, fresh rolls, snackable first tastes, and recipes meant to open the meal.</p>
    </section>

    <section class="search-panel" aria-label="Appetizer search controls">
      <label class="search-label" for="appetizer-search">Search appetizers</label>
      <input class="search-input" id="appetizer-search" type="search" placeholder="Search spring rolls, cheese rolls, pepperoni, fresh rolls..." autocomplete="off" />
      <div class="quick-searches" id="appetizer-filters" aria-label="Appetizer quick filters"></div>
    </section>

    <section aria-labelledby="appetizer-heading">
      <div class="section-heading"><div><p class="eyebrow">Current pages</p><h2 id="appetizer-heading">Starters and small bites</h2></div><p>This path only shows recipes categorized as appetizers or starters.</p></div>
      <div class="feature-grid searchable-card-grid" id="appetizer-results"></div>
    </section>
  </main>
  <script src="world-recipe-data.js?v=20260614-01"></script>
  <script src="family-recipe-data.js?v=20260613-04"></script>
  <script src="path-page-search.js?v=20260614-01"></script>
  <script>
    window.FLAVORWEAVER_PATH_PAGE_SEARCH.init({
      searchInputId: 'appetizer-search',
      filterMountId: 'appetizer-filters',
      resultMountId: 'appetizer-results',
      categories: ['Appetizer', 'Appetizers'],
      quickFilters: ['spring rolls', 'fresh rolls', 'cheese rolls', 'pepperoni', 'appetizer'],
      emptyText: 'Try spring rolls, fresh rolls, cheese rolls, pepperoni, or appetizer.'
    });
  </script>
</body>
</html>
